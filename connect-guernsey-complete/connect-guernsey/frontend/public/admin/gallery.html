<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gallery — Connect Guernsey Admin</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">Gallery</div><div class="top-actions" id="topActions"><button class="btn btn-gold" onclick="openAlbumModal()">+ New Album</button></div></div>
    <div class="page-body" id="albumsView">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem" id="albumsGrid"><div style="color:#aaa;font-size:.88rem">Loading...</div></div>
    </div>
    <div class="page-body" id="photosView" style="display:none">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button onclick="backToAlbums()" class="btn btn-ghost btn-sm">← All Albums</button>
        <div id="currentAlbumTitle" style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--navy)"></div>
      </div>
      <div style="display:flex;gap:1rem;margin-bottom:1.5rem">
        <input type="url" id="photoUrl" placeholder="Image URL (paste link)" style="flex:1;border:1px solid #ddd;padding:.6rem .9rem;font-size:.84rem;font-family:'DM Sans',sans-serif;outline:none">
        <input type="text" id="photoCaption" placeholder="Caption (optional)" style="flex:1;border:1px solid #ddd;padding:.6rem .9rem;font-size:.84rem;font-family:'DM Sans',sans-serif;outline:none">
        <button class="btn btn-gold" onclick="addPhoto()">Add Photo</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem" id="photosGrid"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="albumModal">
  <div class="modal"><div class="modal-header"><span class="modal-title">New Album</span><button class="modal-close" onclick="closeAlbumModal()">×</button></div>
    <div class="modal-body">
      <div id="albumAlert"></div>
      <div class="form-group"><label>Album Title *</label><input type="text" id="albumTitle" required></div>
      <div class="form-group"><label>Description</label><textarea id="albumDesc" style="height:80px"></textarea></div>
      <div class="form-group"><label>Cover Image URL</label><input type="url" id="albumCover" placeholder="https://..."></div>
      <div class="form-group" style="display:flex;align-items:center;gap:.75rem"><input type="checkbox" id="albumPublished" style="width:auto"><label style="text-transform:none;letter-spacing:0;font-size:.86rem;color:#555;margin:0">Published</label></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeAlbumModal()">Cancel</button><button class="btn btn-gold" onclick="createAlbum()">Create Album</button></div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if(!requireAuth())throw '';
buildSidebar('gallery');
let currentAlbumId='';
async function loadAlbums(){
  try{
    const{albums}=await adminApi.get('/api/gallery/');
    document.getElementById('albumsGrid').innerHTML=albums.map(a=>`
      <div style="background:white;overflow:hidden;cursor:pointer" onclick="viewAlbum('${a.id}','${a.title}')">
        <div style="height:160px;background:var(--navy);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center">${a.cover_image_url?`<img src="${a.cover_image_url}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:2.5rem;opacity:.2">📷</span>`}<div style="position:absolute;top:.5rem;right:.5rem"><span class="badge badge-${a.is_published?'green':'amber'}">${a.is_published?'Live':'Draft'}</span></div></div>
        <div style="padding:1rem"><div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--navy)">${a.title}</div><div style="font-size:.75rem;color:#aaa;margin-top:.25rem">${a.photo_count||0} photos</div></div>
        <div style="padding:.75rem 1rem;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:.5rem" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="toggleAlbumPublish('${a.id}',${!a.is_published})">${a.is_published?'Unpublish':'Publish'}</button>
          <button class="btn btn-red btn-sm" onclick="deleteAlbum('${a.id}','${a.title}')">Delete</button>
        </div>
      </div>`).join('')||'<div style="color:#aaa;font-size:.88rem">No albums yet. Create your first album!</div>';
  }catch(e){}
}
function openAlbumModal(){document.getElementById('albumModal').classList.add('open');}
function closeAlbumModal(){document.getElementById('albumModal').classList.remove('open');}
async function createAlbum(){
  try{
    await adminApi.post('/api/gallery/albums',{title:document.getElementById('albumTitle').value,description:document.getElementById('albumDesc').value,cover_image_url:document.getElementById('albumCover').value||null,is_published:document.getElementById('albumPublished').checked});
    closeAlbumModal();loadAlbums();
  }catch(e){showAlert('albumAlert',e.message,'error');}
}
async function toggleAlbumPublish(id,pub){try{await adminApi.patch(`/api/gallery/albums/${id}`,{is_published:pub});loadAlbums();}catch(e){alert(e.message);}}
async function deleteAlbum(id,title){if(!window.confirm(`Delete album "${title}" and all its photos?`))return;try{await adminApi.delete(`/api/gallery/albums/${id}`);loadAlbums();}catch(e){alert(e.message);}}
function viewAlbum(id,title){
  currentAlbumId=id;
  document.getElementById('currentAlbumTitle').textContent=title;
  document.getElementById('albumsView').style.display='none';
  document.getElementById('photosView').style.display='block';
  loadPhotos(id);
}
function backToAlbums(){document.getElementById('albumsView').style.display='block';document.getElementById('photosView').style.display='none';loadAlbums();}
async function loadPhotos(albumId){
  try{
    const{albums}=await adminApi.get('/api/gallery/');
    const album=albums.find(a=>a.id===albumId);
    const photos=album?[]:[];
    document.getElementById('photosGrid').innerHTML=photos.length?photos.map(p=>`
      <div style="position:relative;aspect-ratio:1;overflow:hidden;background:#f0f0f0">
        <img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover">
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:.75rem .5rem">
          <div style="font-size:.7rem;color:rgba(255,255,255,.7)">${p.caption||''}</div>
        </div>
        <button onclick="deletePhoto('${p.id}')" style="position:absolute;top:.4rem;right:.4rem;background:rgba(139,38,53,.85);border:none;color:white;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.8rem">×</button>
      </div>`).join(''):'<div style="color:#aaa;font-size:.88rem;grid-column:1/-1;padding:2rem 0">No photos yet. Add the first photo above.</div>';
  }catch(e){}
}
async function addPhoto(){
  const url=document.getElementById('photoUrl').value;
  if(!url)return;
  try{
    await adminApi.post('/api/gallery/photos',{album_id:currentAlbumId,image_url:url,caption:document.getElementById('photoCaption').value});
    document.getElementById('photoUrl').value='';document.getElementById('photoCaption').value='';
    loadPhotos(currentAlbumId);
  }catch(e){alert(e.message);}
}
async function deletePhoto(id){if(!window.confirm('Remove this photo?'))return;try{await adminApi.delete(`/api/gallery/photos/${id}`);loadPhotos(currentAlbumId);}catch(e){alert(e.message);}}
loadAlbums();
</script>
</body>
</html>
