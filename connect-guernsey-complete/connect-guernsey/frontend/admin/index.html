<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — Connect Guernsey</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div style="width:50px;height:50px;background:var(--gold);transform:rotate(45deg);margin:0 auto 1.25rem;display:flex;align-items:center;justify-content:center;">
        <span style="transform:rotate(-45deg);font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--navy-deep);font-size:1rem">CG</span>
      </div>
      <h1>Connect Guernsey</h1>
      <p>Admin Portal</p>
    </div>
    <div id="loginAlert"></div>
    <form id="loginForm">
      <div class="form-group"><label>Email Address</label><input type="email" id="email" required placeholder="admin@connectguernsey.gg" autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-navy" style="width:100%;margin-top:.5rem;padding:.85rem" id="loginBtn">Sign In</button>
    </form>
    <div style="margin-top:2rem;text-align:center"><a href="/" style="font-size:.72rem;color:#aaa;letter-spacing:.08em">← Back to website</a></div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if (_token) location.href = '/admin/dashboard.html';
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const r = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Invalid credentials');
    localStorage.setItem('cg_token', data.access_token);
    localStorage.setItem('cg_admin', JSON.stringify(data.admin));
    location.href = '/admin/dashboard.html';
  } catch(err) {
    showAlert('loginAlert', err.message, 'error');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});
</script>
</body>
</html>
