<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blog & News — Connect Guernsey</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
.blog-layout{padding:4rem 6rem;background:var(--cream);display:grid;grid-template-columns:1fr 300px;gap:4rem;align-items:start;}
.blog-cats{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:3rem;}
.cat-btn{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid rgba(0,0,0,.15);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.cat-btn.active,.cat-btn:hover{background:var(--navy);color:white;border-color:var(--navy);}
.blog-grid-main{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.blog-card-main{background:white;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;}
.blog-card-main:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.08);}
.blog-card-main.featured{grid-column:1/-1;}
.bc-img{height:200px;background:var(--navy);position:relative;overflow:hidden;}
.bc-img img{width:100%;height:100%;object-fit:cover;}
.bc-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.15;}
.bc-img .bc-cat-badge{position:absolute;top:1rem;left:1rem;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;padding:.3rem .75rem;border-radius:100px;}
.featured .bc-img{height:320px;}
.bc-content{padding:2rem;}
.bc-content h2,.bc-content h3{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:.75rem;}
.bc-content h2{font-size:1.8rem;}
.bc-content h3{font-size:1.3rem;}
.bc-content p{font-size:.85rem;color:var(--muted);line-height:1.75;font-weight:300;}
.bc-footer{padding:1rem 2rem;border-top:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--muted);}
.blog-sidebar{position:sticky;top:100px;}
.sidebar-box{background:white;padding:2rem;margin-bottom:1.5rem;}
.sidebar-box h4{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--navy);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid rgba(0,0,0,.07);}
.sidebar-post{display:flex;gap:.75rem;margin-bottom:1rem;cursor:pointer;transition:opacity .2s;}
.sidebar-post:hover{opacity:.7;}
.sidebar-post-title{font-size:.82rem;color:var(--navy);line-height:1.4;font-weight:500;}
.sidebar-post-date{font-size:.68rem;color:var(--muted);margin-top:.2rem;}
/* Post view */
.post-view{display:none;padding:4rem 6rem;background:var(--cream);}
.post-view.active{display:block;}
.post-header{max-width:800px;margin:0 auto 3rem;}
.post-body{max-width:800px;margin:0 auto;background:white;padding:3rem;}
.post-body p{font-size:.95rem;line-height:1.9;color:#333;margin-bottom:1.25rem;font-weight:300;}
.post-body h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--navy);margin:2rem 0 1rem;}
.post-body h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--navy);margin:1.5rem 0 .75rem;}
@media(max-width:1024px){
  .blog-layout{grid-template-columns:1fr;padding:2rem;}.blog-sidebar{position:static;}
  .blog-grid-main{grid-template-columns:1fr;}.post-view{padding:2rem;}
}
</style>
</head>
<body>
<nav id="nav"></nav>
<div id="mobile-nav" class="nav-mobile"></div>
<div class="page-hero" id="blogHero">
  <div class="section-label center">Knowledge &amp; Community</div>
  <h1>Blog &amp; News</h1>
  <p>Insights, updates and stories from Connect Guernsey and the island's professional community.</p>
</div>
<div class="mosaic-strip"><div class="ms-1"></div><div class="ms-2"></div><div class="ms-3"></div><div class="ms-4"></div><div class="ms-5"></div><div class="ms-6"></div><div class="ms-7"></div><div class="ms-8"></div><div class="ms-9"></div><div class="ms-10"></div></div>
<div class="blog-layout" id="blogLayout">
  <div>
    <div class="blog-cats">
      <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
      <button class="cat-btn" onclick="filterCat('Networking',this)">Networking</button>
      <button class="cat-btn" onclick="filterCat('Entrepreneurship',this)">Entrepreneurship</button>
      <button class="cat-btn" onclick="filterCat('Mentorship',this)">Mentorship</button>
      <button class="cat-btn" onclick="filterCat('News',this)">News</button>
    </div>
    <div class="blog-grid-main" id="blogGrid">
      <div style="grid-column:1/-1;color:var(--muted);font-size:.88rem;padding:2rem 0">Loading posts...</div>
    </div>
  </div>
  <div class="blog-sidebar">
    <div class="sidebar-box">
      <h4>Recent Posts</h4>
      <div id="sidebarPosts"></div>
    </div>
    <div class="sidebar-box" style="background:var(--navy)">
      <h4 style="color:var(--gold);border-color:rgba(255,255,255,.1)">Join Connect Guernsey</h4>
      <p style="font-size:.84rem;color:rgba(255,255,255,.6);line-height:1.75;margin-bottom:1.5rem">Stay informed and be part of Guernsey's growing professional network.</p>
      <a href="/membership.html#register" class="btn btn-gold" style="display:block;text-align:center">Become a Member</a>
    </div>
  </div>
</div>
<div class="post-view" id="postView">
  <div class="post-header">
    <button onclick="backToBlog()" style="background:none;border:none;cursor:pointer;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;display:flex;align-items:center;gap:.5rem">← Back to Blog</button>
    <div id="postCat" style="margin-bottom:1rem"></div>
    <h1 id="postTitle" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:300;color:var(--navy);line-height:1.15;margin-bottom:1rem"></h1>
    <div id="postMeta" style="font-size:.78rem;color:var(--muted);display:flex;gap:1.5rem;margin-bottom:2rem"></div>
    <div id="postHeroImg"></div>
  </div>
  <div class="post-body" id="postBody"></div>
</div>
<footer></footer>
<script src="/assets/js/api.js"></script>
<script>
const CATS={Networking:'rgba(196,98,45,.15);color:#C4622D',Entrepreneurship:'rgba(45,106,79,.15);color:#2D6A4F',Mentorship:'rgba(92,61,143,.15);color:#5C3D8F',News:'rgba(201,168,76,.15);color:#8a6d1e'};
let allPosts=[];
function catStyle(cat){const s=(CATS[cat]||'rgba(13,31,60,.08);color:var(--navy)').split(';');return`background:${s[0]};${s[1]}`;}
function filterCat(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  renderPosts(cat==='all'?allPosts:allPosts.filter(p=>p.category===cat));
}
function renderPosts(posts){
  if(!posts.length){document.getElementById('blogGrid').innerHTML='<div style="grid-column:1/-1;color:var(--muted);font-size:.88rem">No posts in this category yet.</div>';return;}
  document.getElementById('blogGrid').innerHTML=posts.map((p,i)=>`
    <div class="blog-card-main ${i===0?'featured':''} reveal" onclick="viewPost('${p.slug}')">
      <div class="bc-img">${p.image_url?`<img src="${p.image_url}" alt="${p.title}">`:`<div class="bc-img-placeholder">✍️</div>`}<span class="bc-cat-badge" style="${catStyle(p.category)}">${p.category||'News'}</span></div>
      <div class="bc-content">${i===0?`<h2>${p.title}</h2>`:`<h3>${p.title}</h3>`}<p>${p.excerpt||(p.content||'').substring(0,180)}...</p></div>
      <div class="bc-footer"><span>${p.author||'Connect Guernsey'}</span><span>${formatMonth(p.published_at)}</span></div>
    </div>`).join('');
  initReveal();
}
async function viewPost(slug){
  try{
    const post=await api.get(`/api/blog/public/${slug}`);
    document.getElementById('blogLayout').style.display='none';
    document.getElementById('blogHero').style.display='none';
    const pv=document.getElementById('postView');pv.classList.add('active');
    document.getElementById('postCat').innerHTML=`<span style="font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:.3rem .8rem;border-radius:100px;${catStyle(post.category)}">${post.category||'News'}</span>`;
    document.getElementById('postTitle').textContent=post.title;
    document.getElementById('postMeta').innerHTML=`<span>By ${post.author||'Connect Guernsey'}</span><span>${formatDate(post.published_at)}</span>`;
    document.getElementById('postHeroImg').innerHTML=post.image_url?`<img src="${post.image_url}" style="width:100%;height:300px;object-fit:cover;margin-bottom:2rem">`:'';;
    document.getElementById('postBody').innerHTML=post.content.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
    window.scrollTo(0,0);
  }catch(e){alert('Post not found.');}
}
function backToBlog(){
  document.getElementById('blogLayout').style.display='grid';
  document.getElementById('blogHero').style.display='block';
  document.getElementById('postView').classList.remove('active');
}
async function loadBlog(){
  const fallback=[
    {slug:'why-guernsey-needs-network',title:'Why Guernsey Needs a Dedicated Professional Network Right Now',excerpt:'The island\'s finance sector is evolving rapidly. Now is the perfect moment to build connections that define the next decade.',category:'Networking',author:'Connect Guernsey',published_at:'2025-11-01'},
    {slug:'guernsey-entrepreneurship',title:'Innovation on a Small Island: The Unique Guernsey Advantage',excerpt:'Small doesn\'t mean limited. How Guernsey\'s size and international connections make it an ideal launchpad for entrepreneurs.',category:'Entrepreneurship',author:'Connect Guernsey',published_at:'2025-12-01'},
    {slug:'power-of-mentorship',title:'The Power of Mentorship in a Tight-Knit Community',excerpt:'On an island of 63,000 people, mentorship relationships can form faster and go deeper than anywhere else.',category:'Mentorship',author:'Connect Guernsey',published_at:'2026-01-01'},
  ];
  try{
    const{posts}=await api.get('/api/blog/public?limit=20');
    allPosts=posts&&posts.length?posts:fallback;
  }catch(e){allPosts=fallback;}
  renderPosts(allPosts);
  document.getElementById('sidebarPosts').innerHTML=allPosts.slice(0,5).map(p=>`
    <div class="sidebar-post" onclick="viewPost('${p.slug}')">
      <div><div class="sidebar-post-title">${p.title}</div><div class="sidebar-post-date">${formatMonth(p.published_at)}</div></div>
    </div>`).join('');
}
document.addEventListener('DOMContentLoaded',async()=>{
  buildNav('blog');await loadContent();fillAll();loadBlog();
  if(location.hash){const slug=location.hash.replace('#','');if(slug)setTimeout(()=>viewPost(slug),500);}
});
</script>
</body>
</html>
