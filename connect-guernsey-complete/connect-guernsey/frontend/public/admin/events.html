<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Events — Connect Guernsey Admin</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">Events</div><div class="top-actions"><button class="btn btn-gold" onclick="openEventModal()">+ New Event</button></div></div>
    <div class="page-body">
      <div class="card">
        <div class="card-body"><div class="table-wrap"><table>
          <thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Type</th><th>Status</th><th>RSVPs</th><th>Actions</th></tr></thead>
          <tbody id="eventsTable"><tr><td colspan="7" style="color:#aaa">Loading...</td></tr></tbody>
        </table></div></div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="eventModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header"><span class="modal-title" id="eventModalTitle">New Event</span><button class="modal-close" onclick="closeEventModal()">×</button></div>
    <div class="modal-body">
      <div id="eventAlert"></div>
      <form id="eventForm">
        <input type="hidden" id="eventId">
        <div class="form-group"><label>Title *</label><input type="text" id="evTitle" required></div>
        <div class="form-row">
          <div class="form-group"><label>Event Date &amp; Time *</label><input type="datetime-local" id="evDate" required></div>
          <div class="form-group"><label>End Date &amp; Time</label><input type="datetime-local" id="evEndDate"></div>
        </div>
        <div class="form-group"><label>Location *</label><input type="text" id="evLocation" required placeholder="e.g. St Peter Port, Guernsey"></div>
        <div class="form-row">
          <div class="form-group"><label>Event Type</label>
            <select id="evType"><option value="open">Open Event</option><option value="members_only">Members Only</option></select>
          </div>
          <div class="form-group"><label>Capacity</label><input type="number" id="evCapacity" placeholder="Leave blank for unlimited"></div>
        </div>
        <div class="form-group"><label>Short Description (used in cards)</label><input type="text" id="evShortDesc" placeholder="One sentence summary"></div>
        <div class="form-group"><label>Full Description *</label><textarea id="evDesc" required></textarea></div>
        <div class="form-group"><label>Image URL</label><input type="url" id="evImage" placeholder="https://..."></div>
        <div class="form-group" style="display:flex;align-items:center;gap:.75rem">
          <input type="checkbox" id="evPublished" style="width:auto">
          <label style="text-transform:none;letter-spacing:0;font-size:.86rem;color:#555;margin:0">Publish immediately</label>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeEventModal()">Cancel</button><button class="btn btn-gold" onclick="saveEvent()" id="saveEventBtn">Save Event</button></div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if(!requireAuth())throw '';
buildSidebar('events');
let editingEventId=null;
async function loadEvents(){
  try{
    const{events}=await adminApi.get('/api/events/');
    document.getElementById('eventsTable').innerHTML=events.map(e=>`
      <tr>
        <td><strong>${e.title}</strong></td>
        <td style="font-size:.82rem">${formatDateTime(e.event_date)}</td>
        <td style="font-size:.82rem">${e.location}</td>
        <td><span class="badge badge-${e.event_type==='members_only'?'blue':'gray'}">${e.event_type==='members_only'?'Members':'Open'}</span></td>
        <td><span class="badge badge-${e.is_published?'green':'amber'}">${e.is_published?'Published':'Draft'}</span></td>
        <td style="font-size:.82rem">—</td>
        <td style="display:flex;gap:.4rem;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick='editEvent(${JSON.stringify(e).replace(/'/g,"&#39;")})'>Edit</button>
          ${e.is_published?`<button class="btn btn-ghost btn-sm" onclick="togglePublish('${e.id}',false)">Unpublish</button>`:`<button class="btn btn-gold btn-sm" onclick="togglePublish('${e.id}',true)">Publish</button>`}
          <button class="btn btn-red btn-sm" onclick="deleteEvent('${e.id}','${e.title}')">Delete</button>
        </td>
      </tr>`).join('')||'<tr><td colspan="7" style="color:#aaa">No events yet</td></tr>';
  }catch(e){document.getElementById('eventsTable').innerHTML=`<tr><td colspan="7" style="color:red">${e.message}</td></tr>`;}
}
function openEventModal(){
  editingEventId=null;
  document.getElementById('eventModalTitle').textContent='New Event';
  document.getElementById('eventForm').reset();
  document.getElementById('eventModal').classList.add('open');
}
function closeEventModal(){document.getElementById('eventModal').classList.remove('open');}
function editEvent(e){
  editingEventId=e.id;
  document.getElementById('eventModalTitle').textContent='Edit Event';
  document.getElementById('evTitle').value=e.title||'';
  document.getElementById('evDate').value=e.event_date?e.event_date.slice(0,16):'';
  document.getElementById('evEndDate').value=e.end_date?e.end_date.slice(0,16):'';
  document.getElementById('evLocation').value=e.location||'';
  document.getElementById('evType').value=e.event_type||'open';
  document.getElementById('evCapacity').value=e.capacity||'';
  document.getElementById('evShortDesc').value=e.short_description||'';
  document.getElementById('evDesc').value=e.description||'';
  document.getElementById('evImage').value=e.image_url||'';
  document.getElementById('evPublished').checked=e.is_published||false;
  document.getElementById('eventModal').classList.add('open');
}
async function saveEvent(){
  const btn=document.getElementById('saveEventBtn');btn.textContent='Saving...';btn.disabled=true;
  const data={
    title:document.getElementById('evTitle').value,
    event_date:document.getElementById('evDate').value,
    end_date:document.getElementById('evEndDate').value||null,
    location:document.getElementById('evLocation').value,
    event_type:document.getElementById('evType').value,
    capacity:parseInt(document.getElementById('evCapacity').value)||null,
    short_description:document.getElementById('evShortDesc').value,
    description:document.getElementById('evDesc').value,
    image_url:document.getElementById('evImage').value||null,
    is_published:document.getElementById('evPublished').checked
  };
  try{
    if(editingEventId)await adminApi.patch(`/api/events/${editingEventId}`,data);
    else await adminApi.post('/api/events/',data);
    closeEventModal();loadEvents();
  }catch(e){showAlert('eventAlert',e.message,'error');}
  btn.textContent='Save Event';btn.disabled=false;
}
async function togglePublish(id,pub){
  try{await adminApi.post(`/api/events/${id}/${pub?'publish':'unpublish'}`,{});loadEvents();}
  catch(e){alert(e.message);}
}
async function deleteEvent(id,title){
  if(!window.confirm(`Delete event "${title}"? This cannot be undone.`))return;
  try{await adminApi.delete(`/api/events/${id}`);loadEvents();}catch(e){alert(e.message);}
}
loadEvents();
if(new URLSearchParams(location.search).get('action')==='new')openEventModal();
</script>
</body>
</html>
