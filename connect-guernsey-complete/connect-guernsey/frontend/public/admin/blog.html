<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blog — Connect Guernsey Admin</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">Blog &amp; News</div><div class="top-actions"><button class="btn btn-gold" onclick="openPostEditor()">+ New Post</button></div></div>
    <div class="page-body" id="listView">
      <div class="card">
        <div class="card-body"><div class="table-wrap"><table>
          <thead><tr><th>Title</th><th>Category</th><th>Author</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="postsTable"><tr><td colspan="6" style="color:#aaa">Loading...</td></tr></tbody>
        </table></div></div>
      </div>
    </div>
    <div class="page-body" id="editorView" style="display:none">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button onclick="backToList()" class="btn btn-ghost btn-sm">← Back to Posts</button>
        <div id="editorTitle" style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--navy)">New Post</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem;align-items:start">
        <div>
          <div class="card"><div class="card-body">
            <div id="postAlert"></div>
            <input type="hidden" id="postId">
            <div class="form-group"><label>Post Title *</label><input type="text" id="postTitle" placeholder="Enter post title" style="font-size:1.1rem;font-weight:500"></div>
            <div class="form-group"><label>Excerpt (shown on listings)</label><textarea id="postExcerpt" style="height:80px" placeholder="Short summary of the post"></textarea></div>
            <div class="form-group"><label>Content *</label></div>
            <div id="editorContainer"></div>
            <textarea id="postContent" style="display:none"></textarea>
          </div></div>
        </div>
        <div>
          <div class="card"><div class="card-body">
            <div class="form-group"><label>Category</label>
              <select id="postCat"><option value="">Select category</option><option>Networking</option><option>Entrepreneurship</option><option>Mentorship</option><option>News</option></select>
            </div>
            <div class="form-group"><label>Featured Image URL</label><input type="url" id="postImage" placeholder="https://..."></div>
            <div class="form-group"><label>Publish Date</label><input type="datetime-local" id="postDate"></div>
            <div class="form-group" style="display:flex;align-items:center;gap:.75rem">
              <input type="checkbox" id="postPublished" style="width:auto">
              <label style="text-transform:none;letter-spacing:0;font-size:.86rem;color:#555;margin:0">Published</label>
            </div>
            <button class="btn btn-gold" style="width:100%" onclick="savePost()" id="savePostBtn">Save Post</button>
          </div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if(!requireAuth())throw '';
buildSidebar('blog');
let editingPostId=null;
async function loadPosts(){
  try{
    const{posts}=await adminApi.get('/api/blog/');
    document.getElementById('postsTable').innerHTML=posts.map(p=>`
      <tr>
        <td><strong>${p.title}</strong></td>
        <td><span class="badge badge-gray">${p.category||'Uncategorised'}</span></td>
        <td style="font-size:.82rem">${p.author||'—'}</td>
        <td><span class="badge badge-${p.is_published?'green':'amber'}">${p.is_published?'Published':'Draft'}</span></td>
        <td style="font-size:.78rem;color:#aaa">${formatDate(p.published_at||p.created_at)}</td>
        <td style="display:flex;gap:.4rem">
          <button class="btn btn-ghost btn-sm" onclick='editPost(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Edit</button>
          <button class="btn btn-red btn-sm" onclick="deletePost('${p.id}','${p.title}')">Delete</button>
        </td>
      </tr>`).join('')||'<tr><td colspan="6" style="color:#aaa">No posts yet. Create your first post!</td></tr>';
  }catch(e){}
}
function openPostEditor(){
  editingPostId=null;
  document.getElementById('editorTitle').textContent='New Post';
  document.getElementById('postId').value='';
  document.getElementById('postTitle').value='';
  document.getElementById('postExcerpt').value='';
  document.getElementById('postContent').value='';
  document.getElementById('postCat').value='';
  document.getElementById('postImage').value='';
  document.getElementById('postDate').value='';
  document.getElementById('postPublished').checked=false;
  document.getElementById('listView').style.display='none';
  document.getElementById('editorView').style.display='block';
  initEditor('editorContainer','postContent');
}
function editPost(p){
  editingPostId=p.id;
  document.getElementById('editorTitle').textContent='Edit Post';
  document.getElementById('postTitle').value=p.title||'';
  document.getElementById('postExcerpt').value=p.excerpt||'';
  document.getElementById('postContent').value=p.content||'';
  document.getElementById('postCat').value=p.category||'';
  document.getElementById('postImage').value=p.image_url||'';
  document.getElementById('postDate').value=p.published_at?p.published_at.slice(0,16):'';
  document.getElementById('postPublished').checked=p.is_published||false;
  document.getElementById('listView').style.display='none';
  document.getElementById('editorView').style.display='block';
  initEditor('editorContainer','postContent');
  setTimeout(()=>{const a=document.getElementById('editorContainer_area');if(a)a.innerHTML=p.content||'';},100);
}
function backToList(){
  document.getElementById('listView').style.display='block';
  document.getElementById('editorView').style.display='none';
  loadPosts();
}
async function savePost(){
  const btn=document.getElementById('savePostBtn');btn.textContent='Saving...';btn.disabled=true;
  const data={
    title:document.getElementById('postTitle').value,
    excerpt:document.getElementById('postExcerpt').value,
    content:document.getElementById('postContent').value,
    category:document.getElementById('postCat').value,
    image_url:document.getElementById('postImage').value||null,
    published_at:document.getElementById('postDate').value||null,
    is_published:document.getElementById('postPublished').checked
  };
  try{
    if(editingPostId)await adminApi.patch(`/api/blog/${editingPostId}`,data);
    else await adminApi.post('/api/blog/',data);
    showAlert('postAlert','Post saved successfully!');setTimeout(backToList,1200);
  }catch(e){showAlert('postAlert',e.message,'error');}
  btn.textContent='Save Post';btn.disabled=false;
}
async function deletePost(id,title){
  if(!window.confirm(`Delete "${title}"?`))return;
  try{await adminApi.delete(`/api/blog/${id}`);loadPosts();}catch(e){alert(e.message);}
}
loadPosts();
if(new URLSearchParams(location.search).get('action')==='new')openPostEditor();
</script>
</body>
</html>
