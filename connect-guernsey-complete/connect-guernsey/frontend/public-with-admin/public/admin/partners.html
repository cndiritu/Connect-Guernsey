<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Partners — Connect Guernsey Admin</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">Partners &amp; Sponsors</div><div class="top-actions"><button class="btn btn-gold" onclick="openPartnerModal()">+ Add Partner</button></div></div>
    <div class="page-body">
      <div class="card"><div class="card-body"><div class="table-wrap"><table>
        <thead><tr><th>Name</th><th>Type</th><th>Website</th><th>Order</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="partnersTable"><tr><td colspan="6" style="color:#aaa">Loading...</td></tr></tbody>
      </table></div></div></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="partnerModal">
  <div class="modal"><div class="modal-header"><span class="modal-title" id="partnerModalTitle">Add Partner</span><button class="modal-close" onclick="closePartnerModal()">×</button></div>
    <div class="modal-body">
      <div id="partnerAlert"></div>
      <input type="hidden" id="partnerId">
      <div class="form-group"><label>Name *</label><input type="text" id="pName" required></div>
      <div class="form-row">
        <div class="form-group"><label>Type</label>
          <select id="pType"><option value="partner">Partner</option><option value="sponsor_gold">Gold Sponsor</option><option value="sponsor_silver">Silver Sponsor</option><option value="sponsor_bronze">Bronze Sponsor</option></select>
        </div>
        <div class="form-group"><label>Display Order</label><input type="number" id="pOrder" value="0"></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="pDesc" style="height:80px"></textarea></div>
      <div class="form-group"><label>Logo URL</label><input type="url" id="pLogo" placeholder="https://..."></div>
      <div class="form-group"><label>Website URL</label><input type="url" id="pWebsite" placeholder="https://..."></div>
      <div class="form-group" style="display:flex;align-items:center;gap:.75rem"><input type="checkbox" id="pActive" checked style="width:auto"><label style="text-transform:none;letter-spacing:0;font-size:.86rem;color:#555;margin:0">Active (visible on website)</label></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closePartnerModal()">Cancel</button><button class="btn btn-gold" onclick="savePartner()" id="savePartnerBtn">Save</button></div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if(!requireAuth())throw '';
buildSidebar('partners');
let editingPartnerId=null;
async function loadPartners(){
  try{
    const{partners}=await adminApi.get('/api/partners/');
    document.getElementById('partnersTable').innerHTML=partners.map(p=>`
      <tr>
        <td><strong>${p.name}</strong></td>
        <td><span class="badge badge-${p.partner_type?.includes('gold')?'amber':p.partner_type?.includes('silver')?'gray':'blue'}">${p.partner_type?.replace('_',' ')||'Partner'}</span></td>
        <td style="font-size:.8rem">${p.website_url?`<a href="${p.website_url}" target="_blank" style="color:var(--navy)">${p.website_url.replace('https://','')}</a>`:'—'}</td>
        <td style="font-size:.82rem">${p.display_order}</td>
        <td><span class="badge badge-${p.is_active?'green':'gray'}">${p.is_active?'Active':'Hidden'}</span></td>
        <td style="display:flex;gap:.4rem">
          <button class="btn btn-ghost btn-sm" onclick='editPartner(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Edit</button>
          <button class="btn btn-red btn-sm" onclick="deletePartner('${p.id}','${p.name}')">Remove</button>
        </td>
      </tr>`).join('')||'<tr><td colspan="6" style="color:#aaa">No partners added yet</td></tr>';
  }catch(e){}
}
function openPartnerModal(){editingPartnerId=null;document.getElementById('partnerModalTitle').textContent='Add Partner';document.getElementById('pName').value='';document.getElementById('pType').value='partner';document.getElementById('pDesc').value='';document.getElementById('pLogo').value='';document.getElementById('pWebsite').value='';document.getElementById('pOrder').value='0';document.getElementById('pActive').checked=true;document.getElementById('partnerModal').classList.add('open');}
function closePartnerModal(){document.getElementById('partnerModal').classList.remove('open');}
function editPartner(p){editingPartnerId=p.id;document.getElementById('partnerModalTitle').textContent='Edit Partner';document.getElementById('pName').value=p.name||'';document.getElementById('pType').value=p.partner_type||'partner';document.getElementById('pDesc').value=p.description||'';document.getElementById('pLogo').value=p.logo_url||'';document.getElementById('pWebsite').value=p.website_url||'';document.getElementById('pOrder').value=p.display_order||0;document.getElementById('pActive').checked=p.is_active!==false;document.getElementById('partnerModal').classList.add('open');}
async function savePartner(){
  const btn=document.getElementById('savePartnerBtn');btn.textContent='Saving...';btn.disabled=true;
  const data={name:document.getElementById('pName').value,partner_type:document.getElementById('pType').value,description:document.getElementById('pDesc').value,logo_url:document.getElementById('pLogo').value||null,website_url:document.getElementById('pWebsite').value||null,display_order:parseInt(document.getElementById('pOrder').value)||0,is_active:document.getElementById('pActive').checked};
  try{if(editingPartnerId)await adminApi.patch(`/api/partners/${editingPartnerId}`,data);else await adminApi.post('/api/partners/',data);closePartnerModal();loadPartners();}
  catch(e){showAlert('partnerAlert',e.message,'error');}
  btn.textContent='Save';btn.disabled=false;
}
async function deletePartner(id,name){if(!window.confirm(`Remove "${name}"?`))return;try{await adminApi.delete(`/api/partners/${id}`);loadPartners();}catch(e){alert(e.message);}}
loadPartners();
</script>
</body>
</html>
