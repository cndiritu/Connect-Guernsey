<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Enquiries — Connect Guernsey Admin</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">Enquiries Inbox</div><div class="top-actions"><div id="enqStats" style="font-size:.78rem;color:#888"></div></div></div>
    <div class="page-body">
      <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm filter-enq active" onclick="setEnqFilter('',this)">All</button>
        <button class="btn btn-ghost btn-sm filter-enq" onclick="setEnqFilter('unread',this)">Unread</button>
        <button class="btn btn-ghost btn-sm filter-enq" onclick="setEnqFilter('read',this)">Read</button>
        <button class="btn btn-ghost btn-sm filter-enq" onclick="setEnqFilter('replied',this)">Replied</button>
      </div>
      <div id="enquiriesList" style="display:flex;flex-direction:column;gap:.75rem"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="enqModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header"><span class="modal-title" id="enqModalName"></span><button class="modal-close" onclick="closeEnqModal()">×</button></div>
    <div class="modal-body" id="enqDetail"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEnqModal()">Close</button>
      <button class="btn btn-gold" onclick="markReplied()">Mark as Replied</button>
      <button class="btn btn-red" onclick="deleteEnq()">Delete</button>
    </div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
<script>
if(!requireAuth())throw '';
buildSidebar('enquiries');
let currentEnqFilter='', currentEnqId='';
function setEnqFilter(val,btn){currentEnqFilter=val;document.querySelectorAll('.filter-enq').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadEnquiries();}
async function loadEnquiries(){
  try{
    let url='/api/enquiries/?limit=50';if(currentEnqFilter)url+=`&status=${currentEnqFilter}`;
    const{enquiries,unread}=await adminApi.get(url);
    document.getElementById('enqStats').textContent=`${unread} unread`;
    document.getElementById('enquiriesList').innerHTML=enquiries.map(e=>`
      <div style="background:white;padding:1.5rem;border-left:3px solid ${e.status==='unread'?'var(--gold)':e.status==='replied'?'#2D6A4F':'#ddd'};cursor:pointer;transition:box-shadow .2s" onclick="viewEnquiry('${e.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <div style="font-weight:600;font-size:.9rem">${e.first_name} ${e.last_name}</div>
          <div style="display:flex;gap:.5rem;align-items:center">
            <span class="badge badge-${e.status==='unread'?'amber':e.status==='replied'?'green':'gray'}">${e.status}</span>
            <span style="font-size:.72rem;color:#aaa">${formatDate(e.created_at)}</span>
          </div>
        </div>
        <div style="font-size:.8rem;color:#888;margin-bottom:.4rem">${e.email} · <strong style="color:var(--navy)">${e.interest}</strong>${e.industry?' · '+e.industry:''}</div>
        <div style="font-size:.84rem;color:#555">${e.message.substring(0,120)}${e.message.length>120?'...':''}</div>
      </div>`).join('')||'<div style="color:#aaa;font-size:.88rem;padding:2rem 0">No enquiries found</div>';
  }catch(err){console.error(err);}
}
async function viewEnquiry(id){
  currentEnqId=id;
  try{
    const{enquiries}=await adminApi.get(`/api/enquiries/?limit=100`);
    const e=enquiries.find(e=>e.id===id);
    if(!e)return;
    if(e.status==='unread')await adminApi.patch(`/api/enquiries/${id}`,{status:'read'});
    document.getElementById('enqModalName').textContent=`${e.first_name} ${e.last_name}`;
    document.getElementById('enqDetail').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
        <div><div style="font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">Email</div><a href="mailto:${e.email}" style="color:var(--navy);font-size:.88rem">${e.email}</a></div>
        <div><div style="font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">Interest</div><div style="font-size:.88rem">${e.interest}</div></div>
        <div><div style="font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">Industry</div><div style="font-size:.88rem">${e.industry||'—'}</div></div>
        <div><div style="font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">Date</div><div style="font-size:.88rem">${formatDateTime(e.created_at)}</div></div>
      </div>
      <div style="font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Message</div>
      <div style="background:#f8f8f8;padding:1.25rem;font-size:.9rem;line-height:1.8;color:#333">${e.message}</div>
      <div style="margin-top:1rem"><a href="mailto:${e.email}?subject=Re: ${e.interest} — Connect Guernsey" class="btn btn-navy btn-sm">Reply by Email</a></div>`;
    document.getElementById('enqModal').classList.add('open');
    loadEnquiries();
  }catch(err){alert(err.message);}
}
async function markReplied(){
  try{await adminApi.patch(`/api/enquiries/${currentEnqId}`,{status:'replied'});closeEnqModal();loadEnquiries();}catch(e){alert(e.message);}
}
async function deleteEnq(){
  if(!window.confirm('Delete this enquiry?'))return;
  try{await adminApi.delete(`/api/enquiries/${currentEnqId}`);closeEnqModal();loadEnquiries();}catch(e){alert(e.message);}
}
function closeEnqModal(){document.getElementById('enqModal').classList.remove('open');}
loadEnquiries();
</script>
</body>
</html>
